<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Delle Model</title>
  <script>
    // Vanity short-links on a static GitHub Pages site: there are no server-side
    // rewrites, and the site is fronted by Cloudflare which strips trailing
    // slashes (so /releases/ -> /releases) while Pages does no extensionless
    // resolution. Pages serves THIS 404.html for any unknown path, so we route
    // the known short-links here: /releases and /changelog both open the on-site
    // changelog page; /download goes to the GitHub release for the installer.
    // Anything else falls through to the 404 message below.
    (function () {
      var seg = location.pathname.replace(/^\/+/, '').split('/')[0].toLowerCase();
      var targets = {
        releases: '/releases/index.html',
        changelog: '/releases/index.html',
        download: 'https://github.com/Delle-orga/Delle-Model-release/releases/latest'
      };
      var dest = targets[seg];
      // Internal targets keep the hash (deep-links like /releases#v1.9.0).
      if (dest) location.replace(dest.charAt(0) === '/' ? dest + location.hash : dest);
    })();
    // Match the site's saved light/dark choice so the 404 isn't jarring.
    (function () {
      var t = localStorage.getItem('theme') || 'light';
      document.documentElement.classList.toggle('light', t === 'light');
    })();
  </script>
  <style>
    :root { --bg:#141317; --fg:#F9FAFB; --accent:#0052f5; }
    html.light { --bg:#E8E8E9; --fg:#1A1A2E; }
    * { box-sizing:border-box; margin:0; }
    body { font-family:"DM Sans",-apple-system,BlinkMacSystemFont,sans-serif;
           background:var(--bg); color:var(--fg); min-height:100vh;
           display:grid; place-items:center; text-align:center; padding:24px; }
    h1 { font-size:clamp(48px,12vw,96px); margin-bottom:8px; line-height:1; }
    p { opacity:.7; margin-bottom:24px; }
    a { display:inline-block; padding:12px 24px; border-radius:99em; font-weight:600;
        text-decoration:none; color:var(--accent);
        background:color-mix(in srgb, var(--accent) 15%, transparent); }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>This page doesn&rsquo;t exist.</p>
    <a href="/">Back to Delle Model</a>
  </div>
</body>
</html>
